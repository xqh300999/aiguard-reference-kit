spring:
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

jwt:
  secret: ${JWT_SECRET:aiguard-jwt-secret-key-2026}

mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://mosquitto:1883}
  client-id: aiguard-backend-prod
  username: ${MQTT_USERNAME:}
  password: ${MQTT_PASSWORD:}

logging:
  level:
    com.elderlycare: INFO
    com.zaxxer.hikari: WARN
