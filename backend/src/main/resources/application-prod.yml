spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:aiguard}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

mqtt:
  broker-url: ${MQTT_BROKER_URL}
  client-id: aiguard-backend-prod
  username: ${MQTT_USERNAME:}
  password: ${MQTT_PASSWORD:}

logging:
  level:
    com.elderlycare: INFO
    com.zaxxer.hikari: INFO
