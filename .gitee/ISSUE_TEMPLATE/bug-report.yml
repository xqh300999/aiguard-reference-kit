name: Bug 反馈
description: 提交可复现的缺陷、测试问题或联调异常
title: "【Bug反馈】请简要说明缺陷"
labels: ["类型：Bug反馈", "状态：信息待补充"]
body:
  - type: markdown
    attributes:
      value: |
        Bug 反馈建议包含期望结果、实际结果、复现步骤和测试环境。
  - type: input
    id: group
    attributes:
      label: 小组
      placeholder: 例如：C组/社区服务组
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: 模块
      options:
        - 后端
        - 数据库
        - 前端
        - 鸿蒙
        - 硬件
        - MQTT
        - HomeAssistant
        - AI
        - 测试
        - 其他
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - P0：主链路阻塞
        - P1：关键功能受阻
        - P2：一般缺陷
        - P3：优化建议
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 测试环境
      description: 浏览器、设备、后端版本、分支、数据库、网络环境等。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      description: 正常应该发生什么？
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      description: 现在发生了什么？可以贴接口响应、日志或截图。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: 影响范围
      description: 影响哪个用户故事、接口、页面或主链路？
    validations:
      required: true
  - type: textarea
    id: workaround
    attributes:
      label: 临时绕过方案
      description: 如果有临时处理方法，可以写在这里。
  - type: textarea
    id: related
    attributes:
      label: 关联提交或 PR/MR
      description: 修复后可补充 commit、PR/MR 或回归测试链接。
