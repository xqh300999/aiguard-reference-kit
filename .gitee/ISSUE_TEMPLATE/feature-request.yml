name: 功能建议
description: 提出特色功能、体验改进或新的用户故事
title: "【功能建议】请简要说明建议"
labels: ["类型：功能建议", "优先级：P3优化建议"]
body:
  - type: input
    id: group
    attributes:
      label: 小组
      placeholder: 例如：B组/亲情关怀组
  - type: textarea
    id: user_story
    attributes:
      label: 用户故事
      description: 建议使用“作为...我希望...以便...”描述。
      placeholder: 作为【用户角色】，我希望【完成某件事】，以便【获得某种价值】。
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: 用户价值
      description: 这个功能解决什么真实问题？
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      placeholder: |
        - 条件一
        - 条件二
        - 条件三
    validations:
      required: true
  - type: textarea
    id: relation
    attributes:
      label: 与主链路的关系
      description: 该功能如何接入 SOS/异常事件主链路？
